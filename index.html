<!-- Filtros con Selección Múltiple -->
<section class="filters">
    <div class="filter-group filter-multiple">
        <label>📋 Módulos:</label>
        <div class="checkbox-group" id="moduloCheckboxes">
            <!-- Los checkboxes se generan dinámicamente -->
        </div>
        <div class="checkbox-actions">
            <button id="selectAllModulos" class="btn-small">Seleccionar todos</button>
            <button id="deselectAllModulos" class="btn-small">Deseleccionar todos</button>
        </div>
    </div>
    
    <div class="filter-group filter-multiple">
        <label>📅 Meses:</label>
        <div class="checkbox-group" id="mesCheckboxes">
            <!-- Los checkboxes se generan dinámicamente -->
        </div>
        <div class="checkbox-actions">
            <button id="selectAllMeses" class="btn-small">Seleccionar todos</button>
            <button id="deselectAllMeses" class="btn-small">Deseleccionar todos</button>
        </div>
    </div>
    
    <div class="filter-group">
        <label for="diaFilter">📆 Día máximo:</label>
        <input type="range" id="diaFilter" min="1" max="31" value="31">
        <span id="diaValue">31</span>
    </div>
    
    <button id="resetFilters">🔄 Resetear Filtros</button>
</section>
