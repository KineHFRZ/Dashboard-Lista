<!-- Gráficos -->
<section class="charts-grid">
    <div class="chart-card">
        <h2>📈 Evolución de Atenciones por Día</h2>
        <canvas id="chartEvolucion"></canvas>
    </div>
    <div class="chart-card">
        <h2>📊 Distribución por Gravedad</h2>
        <canvas id="chartGravedad"></canvas>
    </div>
    <div class="chart-card full-width">
        <h2>🎯 Rendimiento Promedio por Módulo</h2>
        <canvas id="chartRendimiento"></canvas>
    </div>
    <div class="chart-card full-width" style="margin-top: 30px;">
        <h2>📊 Rendimiento por Módulo y Mes</h2>
        <p style="color: #718096; font-size: 0.9em; margin-bottom: 15px;">
            💡 Selecciona un módulo para ver su evolución mensual, o mantén "Todos" para ver la comparativa
        </p>
        <canvas id="chartRendimientoMensual"></canvas>
    </div>
</section>
